<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氣象署 AI 自動化工作坊：Gmail 觸發自動化工作流程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; scroll-behavior: smooth; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #0284c7 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        pre { tab-size: 4; }
        .code-block { background: #f8fafc; border-left: 4px solid #0ea5e9; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
        .case-study-card { background: linear-gradient(135deg, #0b1210 0%, #0e1613 100%); border: 1px solid rgba(232, 240, 235, 0.12); border-radius: 12px; overflow: hidden; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0284c7',
                        secondary: '#0ea5e9',
                        accent: '#f59e0b',
                    }
                }
            }
        }
        function copyCode(buttonId, codeId) {
            const code = document.getElementById(codeId).innerText;
            const dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = code;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);
            const btn = document.getElementById(buttonId);
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check mr-1"></i> 已複製';
            btn.classList.add('bg-green-600');
            btn.classList.remove('bg-gray-700');
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.remove('bg-green-600');
                btn.classList.add('bg-gray-700');
            }, 2000);
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
